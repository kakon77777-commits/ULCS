name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: utf-8
      ULCS_CI_APPROVAL_KEY: ci-approval-key-0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v > test-output.txt 2>&1
      - name: Print unit test output
        if: always()
        run: python -c "import sys; from pathlib import Path; path=Path('test-output.txt'); text=path.read_text(encoding='utf-8', errors='replace') if path.exists() else 'test-output.txt missing'; sys.stdout.buffer.write(text.encode('utf-8', errors='replace'))"
      - name: Upload unit test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-output.txt
          if-no-files-found: warn
      - name: List adapters and capabilities
        run: |
          python -m sos_mvp --list-languages
          python -m sos_mvp --list-capabilities
      - name: Validate DAG example
        run: python -m sos_mvp examples/dag_merge.sos --dry-run --emit-ir output/dag.json
      - name: Validate v0.3 policy and polyglot graph
        run: python -m sos_mvp examples/polyglot_v0.3.sos --policy examples/capability_policy_v0.3.json --dry-run --emit-ir output/polyglot-v0.3.json
      - name: Validate v0.4 resource policy and execution layers
        run: python -m sos_mvp examples/parallel_v0.4.sos --policy examples/resource_policy_v0.4.json --dry-run --emit-ir output/parallel-v0.4.json
      - name: Execute v0.4 bounded parallel graph
        run: python -m sos_mvp examples/parallel_v0.4.sos --policy examples/resource_policy_v0.4.json --yes --json --emit-trace output/parallel-v0.4-trace.json
      - name: Verify v0.4 compatibility under LOG v0.6
        run: python -c "import json; from pathlib import Path; ir=json.loads(Path('output/parallel-v0.4.json').read_text(encoding='utf-8')); trace=json.loads(Path('output/parallel-v0.4-trace.json').read_text(encoding='utf-8')); assert ir['version']=='0.6'; assert ir['execution_layers']==[['left','right'],['merged']]; assert trace['outputs']['merged']['sum']==42; assert trace['execution_layers']==[['left','right'],['merged']]"
      - name: Validate v0.5 repeatability plan
        run: python -m sos_mvp examples/cache_replay_v0.5.sos --policy examples/cache_policy_v0.5.json --dry-run --emit-ir output/cache-v0.5.json
      - name: Execute v0.5 and emit baseline manifest
        run: python -m sos_mvp examples/cache_replay_v0.5.sos --policy examples/cache_policy_v0.5.json --cache-mode read-write --cache-dir output/cache-v0.5 --yes --json --emit-trace output/cache-v0.5-first.json --emit-manifest output/cache-v0.5-manifest.json
      - name: Replay v0.5 with cache and verify manifest
        run: python -m sos_mvp examples/cache_replay_v0.5.sos --policy examples/cache_policy_v0.5.json --cache-mode read-write --cache-dir output/cache-v0.5 --yes --json --verify-manifest output/cache-v0.5-manifest.json --emit-trace output/cache-v0.5-second.json
      - name: Verify v0.5 compatibility under Manifest v0.6
        run: python -c "import json; from pathlib import Path; ir=json.loads(Path('output/cache-v0.5.json').read_text(encoding='utf-8')); first=json.loads(Path('output/cache-v0.5-first.json').read_text(encoding='utf-8')); second=json.loads(Path('output/cache-v0.5-second.json').read_text(encoding='utf-8')); manifest=json.loads(Path('output/cache-v0.5-manifest.json').read_text(encoding='utf-8')); assert ir['version']=='0.6'; assert first['cache_hits']=={'text':False,'errors':False,'summary':False}; assert second['cache_hits']=={'text':False,'errors':True,'summary':False}; assert first['output_digests']==second['output_digests']; assert manifest['version']=='0.6'; assert 'outputs' not in manifest"
      - name: Validate v0.6 Artifact Contract
        run: python -m sos_mvp examples/artifact_resume_v0.6.sos --policy examples/artifact_policy_v0.6.json --contract examples/artifact_contract_v0.6.json --artifact-mode all --artifact-dir output/v0.6/artifacts --dry-run --emit-ir output/v0.6/ir.json
      - name: Execute v0.6 and write checkpoint
        run: python -m sos_mvp examples/artifact_resume_v0.6.sos --policy examples/artifact_policy_v0.6.json --contract examples/artifact_contract_v0.6.json --artifact-mode all --artifact-dir output/v0.6/artifacts --checkpoint output/v0.6/checkpoint.json --yes --json --emit-trace output/v0.6/first.json --emit-manifest output/v0.6/manifest.json
      - name: Resume v0.6 entirely from artifacts
        run: python -m sos_mvp examples/artifact_resume_v0.6.sos --policy examples/artifact_policy_v0.6.json --contract examples/artifact_contract_v0.6.json --artifact-dir output/v0.6/artifacts --resume output/v0.6/checkpoint.json --yes --json --verify-manifest output/v0.6/manifest.json --emit-trace output/v0.6/resumed.json
      - name: Verify v0.6 Artifact and checkpoint artifacts
        run: python -c "import json; from pathlib import Path; ir=json.loads(Path('output/v0.6/ir.json').read_text(encoding='utf-8')); first=json.loads(Path('output/v0.6/first.json').read_text(encoding='utf-8')); second=json.loads(Path('output/v0.6/resumed.json').read_text(encoding='utf-8')); checkpoint=json.loads(Path('output/v0.6/checkpoint.json').read_text(encoding='utf-8')); assert ir['version']=='0.6'; assert ir['nodes'][2]['persist_output'] is True; assert first['outputs']['summary']['count']==2; assert first['resumed']=={'text':False,'errors':False,'summary':False}; assert second['resumed']=={'text':True,'errors':True,'summary':True}; assert len(checkpoint['nodes'])==3; refs=[item['artifact'] for item in checkpoint['nodes'].values()]; assert all((Path('output/v0.6/artifacts') / ref['path']).is_file() for ref in refs); assert first['output_digests']==second['output_digests']"
      - name: List v0.7 Intent Compiler profiles
        run: python -m sos_mvp.intent_cli --list-profiles
      - name: Compile v0.7 Intent Request into a reviewable bundle
        run: python -m sos_mvp.intent_cli examples/intent_request_v0.7.json --output-dir output/v0.7 --json > output/intent-v0.7-compile.json
      - name: Execute generated v0.7 workflow through the existing runtime
        run: python -m sos_mvp output/v0.7/workflow.sos --policy output/v0.7/capability-policy.json --contract output/v0.7/artifact-contract.json --artifact-mode all --artifact-dir output/v0.7/artifacts --yes --json --emit-trace output/v0.7/trace.json
      - name: Verify v0.7 Intent Bundle and generated execution
        run: python -c "import json; from pathlib import Path; compile=json.loads(Path('output/intent-v0.7-compile.json').read_text(encoding='utf-8')); plan=json.loads(Path('output/v0.7/intent-plan.json').read_text(encoding='utf-8')); bundle=json.loads(Path('output/v0.7/intent-bundle.json').read_text(encoding='utf-8')); policy=json.loads(Path('output/v0.7/capability-policy.json').read_text(encoding='utf-8')); trace=json.loads(Path('output/v0.7/trace.json').read_text(encoding='utf-8')); assert compile['status']=='ready'; assert plan['status']=='ready'; assert bundle['format']=='ULCS-Intent-Bundle'; assert bundle['version']=='0.7'; assert policy['mode']=='enforce'; assert trace['outputs']['summary']['total']==3; assert trace['outputs']['summary']['counts']=={'ERROR':2,'FATAL':1}; assert all(Path('output/v0.7', name).is_file() for name in ('workflow.sos','artifact-contract.json','capability-policy.json','intent-plan.json','intent-bundle.json'))"
      - name: Compile v0.8 Provider Proposal into Review Bundle
        run: python -m sos_mvp.provider_cli examples/provider_proposal_v0.8.json --output-dir output/v0.8 --json > output/provider-v0.8-compile.json
      - name: Approve v0.8 Review Bundle
        run: python -m sos_mvp.approval_cli approve output/v0.8/review-bundle.json --approver ci-matrix --reason "CI fixture approval" --key-env ULCS_CI_APPROVAL_KEY --output output/v0.8/approval.json
      - name: Verify v0.8 Approval Record
        run: python -m sos_mvp.approval_cli verify output/v0.8/review-bundle.json output/v0.8/approval.json --key-env ULCS_CI_APPROVAL_KEY --json
      - name: Execute v0.8 approved snapshot
        run: python -m sos_mvp.approved_cli output/v0.8/review-bundle.json output/v0.8/approval.json --key-env ULCS_CI_APPROVAL_KEY -- --artifact-mode all --artifact-dir output/v0.8/artifacts --yes --json --emit-trace output/v0.8/trace.json
      - name: Verify v0.8 Provider Review and approved execution
        run: python -c "import json; from pathlib import Path; compile=json.loads(Path('output/provider-v0.8-compile.json').read_text(encoding='utf-8')); review=json.loads(Path('output/v0.8/review-bundle.json').read_text(encoding='utf-8')); approval=json.loads(Path('output/v0.8/approval.json').read_text(encoding='utf-8')); trace=json.loads(Path('output/v0.8/trace.json').read_text(encoding='utf-8')); assert compile['intent_status']=='ready'; assert review['format']=='ULCS-Review-Bundle'; assert review['version']=='0.8'; assert approval['decision']=='approve'; assert approval['algorithm']=='hmac-sha256'; assert trace['outputs']['summary']['total']==3; assert trace['outputs']['summary']['counts']=={'ERROR':2,'FATAL':1}; assert len(review['files'])==6"
